[tox]
min_version = 4.0
env_list =
    py3{10,11,12,13,14}-django{42,50,52}-psycopg{2,3}
    py3{12,13,14}-django{60}-psycopg{2,3}

[testenv]
# Install wheels instead of source distributions for faster execution.
package = wheel

# Share the build environment between tox environments.
wheel_build_env = .pkg

pass_env =
    DATABASE_URL
dependency_groups = pytest-in-tox
deps =
    django42: django>=4.2,<5.0
    django50: django>=5.0,<5.1
    django52: django>=5.2,<6.0
    django60: django>=6.0,<6.1
    psycopg2: psycopg2-binary
    psycopg3: psycopg[binary]

commands =
    python -m pytest {posargs}
